name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (offline — uses synthetic data)
        run: pytest -q

      - name: Verify brain graph is up to date
        run: |
          python scripts/build_brain.py
          git diff --exit-code brain/Maps/Home.md brain/graph.json \
            || (echo "::error::brain graph is stale — run scripts/build_brain.py and commit" && exit 1)
